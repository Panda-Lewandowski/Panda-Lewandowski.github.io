server {
    listen 80;
    listen [::]:80;
    server_name pandoral.me www.pandoral.me;

    # Current project path on your server
    root /home/ubuntu/Panda-Lewandowski.github.io;
    index index.html;
    charset utf-8;

    # Temporary HTTP-only config for first launch and cert issuance.
    location / {
        try_files $uri $uri/ =404;
    }

    error_page 404 /404.html;

    location ~* \.(?:css|js|mjs|ico|gif|jpe?g|png|svg|webp|woff2?|ttf|eot)$ {
        expires 30d;
        add_header Cache-Control "public, max-age=2592000, immutable";
        access_log off;
    }

    location ~ /\.(?!well-known).* {
        deny all;
    }
}
