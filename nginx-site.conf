server {
    listen 80;
    listen [::]:80;
    server_name example.com www.example.com;

    # Absolute path to deployed site files on server
    root /var/www/panda-lewandowski.github.io;
    index index.html;

    # Allow Let's Encrypt HTTP-01 challenge on port 80
    location ^~ /.well-known/acme-challenge/ {
        default_type "text/plain";
        root /var/www/certbot;
    }

    # Redirect all other HTTP traffic to HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name example.com www.example.com;

    # Absolute path to deployed site files on server
    root /var/www/panda-lewandowski.github.io;
    index index.html;

    charset utf-8;

    # TLS certificates (Let's Encrypt default paths)
    ssl_certificate /etc/letsencrypt/live/example.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/example.com/privkey.pem;
    ssl_session_timeout 1d;
    ssl_session_cache shared:SSL:10m;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;

    # Main static routing
    location / {
        try_files $uri $uri/ =404;
    }

    # Custom 404 page from project root
    error_page 404 /404.html;

    # Cache static assets aggressively
    location ~* \.(?:css|js|mjs|ico|gif|jpe?g|png|svg|webp|woff2?|ttf|eot)$ {
        expires 30d;
        add_header Cache-Control "public, max-age=2592000, immutable";
        access_log off;
    }

    # Do not expose hidden files (except ACME challenge)
    location ~ /\.(?!well-known).* {
        deny all;
    }

    # Security headers
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
}
